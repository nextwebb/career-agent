name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write  # Required for OIDC authentication with claude-code-action@v1

jobs:
  claude-review:
    name: Claude Review
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Check credentials
        id: auth-check
        run: |
          if [[ -z "$ANTHROPIC_API_KEY" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ANTHROPIC_API_KEY secret not set — Claude Review skipped. Add the secret in Settings → Secrets → Actions to enable it."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.auth-check.outputs.configured == 'true'
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        if: steps.auth-check.outputs.configured == 'true'
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
