name: Bug Report
description: Something isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Before filing: check the [Troubleshooting section](../README.md#troubleshooting)"
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Run /career-agent:apply ...\n2. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: dropdown
    id: skill
    attributes:
      label: Which skill?
      options: ["/source", "/new-role", "/generate-cv", "/apply", "/track", "Installation", "Other"]
    validations:
      required: true
  - type: input
    id: claude_version
    attributes:
      label: Claude Code version
      placeholder: "claude --version"
    validations:
      required: true
  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "python3 --version"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options: ["macOS", "Linux", "Windows"]
    validations:
      required: true
