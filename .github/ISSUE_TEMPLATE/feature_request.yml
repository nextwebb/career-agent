name: Feature Request
description: Suggest an improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem, not the solution
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: ["/source skill", "/new-role skill", "/generate-cv skill", "/apply skill", "/track skill", "/setup-profile skill", "ATS platform support", "Distribution/install", "Documentation", "CI/Testing", "Other"]
    validations:
      required: true
