<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">career-agent logo</title>
  <desc id="desc">A dark command prompt mark with an indigo arrow and green completion signal.</desc>
  <defs>
    <linearGradient id="bg" x1="28" y1="20" x2="228" y2="236" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17171b"/>
      <stop offset="1" stop-color="#020203"/>
    </linearGradient>
    <linearGradient id="prompt" x1="68" y1="72" x2="152" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c0c1ff"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.505 0 0 0 0 0.549 0 0 0 0 0.973 0 0 0 0.42 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>
  <rect width="256" height="256" rx="52" fill="url(#bg)"/>
  <rect x="18" y="18" width="220" height="220" rx="42" fill="none" stroke="#353436" stroke-width="2"/>
  <rect x="42" y="54" width="172" height="148" rx="24" fill="#0e0e10" stroke="#464554" stroke-width="3"/>
  <circle cx="70" cy="82" r="7" fill="#ef4444"/>
  <circle cx="94" cy="82" r="7" fill="#d97721"/>
  <circle cx="118" cy="82" r="7" fill="#10b981"/>
  <path d="M78 117l34 26-34 26" fill="none" stroke="url(#prompt)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft-glow)"/>
  <path d="M128 171h54" fill="none" stroke="#e5e2e3" stroke-width="14" stroke-linecap="round"/>
  <path d="M151 119l17 17 32-38" fill="none" stroke="#10b981" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
